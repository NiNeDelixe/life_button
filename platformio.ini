; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:wifiduino32c3]
platform = espressif32
board = wifiduino32c3
framework = arduino
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
board_build.f_cpu = 160000000L
lib_deps = 
	smougenot/TM1637@0.0.0-alpha+sha.9486982048
	esp32async/ESPAsyncWebServer@^3.10.3
	gyverlibs/GTimer@^1.1.1
	miguelbalboa/MFRC522@^1.4.12
extra_scripts = 
	pre:scripts/convert_web_files.py
test_testing_command = 
	${platformio.packages_dir}/tool-openocd/bin/openocd
	-s
	${platformio.packages_dir}/tool-openocd
	-f
	openocd/scripts/board/st_nucleo_l1.cfg
	-c
	init
	-c
	arm semihosting enable
	-c
	reset run

[env:debug]
extends = env:wifiduino32c3
platform = espressif32
build_type = debug
build_flags = -DDEBUG
debug_extra_cmds = 
	monitor arm semihosting enable
	monitor arm semihosting_fileio enable
lib_deps = ${env:wifiduino32c3.lib_deps}
board = ${env:wifiduino32c3.board}
framework = ${env:wifiduino32c3.framework}
monitor_speed = ${env:wifiduino32c3.monitor_speed}
extra_scripts = ${env:wifiduino32c3.extra_scripts}
monitor_dtr = ${env:wifiduino32c3.monitor_dtr}
monitor_rts = ${env:wifiduino32c3.monitor_rts}
board_build.f_cpu = ${env:wifiduino32c3.board_build.f_cpu}

[env:release]
extends = env:wifiduino32c3
platform = espressif32
build_type = release
build_flags = -DNDEBUG
lib_deps = ${env:wifiduino32c3.lib_deps}
board = ${env:wifiduino32c3.board}
framework = ${env:wifiduino32c3.framework}
monitor_speed = ${env:wifiduino32c3.monitor_speed}
extra_scripts = ${env:wifiduino32c3.extra_scripts}
monitor_dtr = ${env:wifiduino32c3.monitor_dtr}
monitor_rts = ${env:wifiduino32c3.monitor_rts}
board_build.f_cpu = ${env:wifiduino32c3.board_build.f_cpu}

[platformio]
description = Life Button for airsoft
